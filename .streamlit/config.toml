[theme]
base = "light"
primaryColor = "#F63366"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[server]
# headless = true prevents the browser from auto-opening every time you run the app. maxUploadSize = 10 caps CSV uploads at 10 MB
headless = true
port = 8501
enableXsrfProtection = true
maxUploadSize = 10

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[runner]
# fastReruns = true makes widget interactions feel snappier
magicEnabled = true
fastReruns = true

[client]
# toolbarMode = "minimal" hides the top-right Streamlit hamburger menu clutter in production.
# ➡false
showErrorDetails = true
# ➡auto
toolbarMode = "minimal"